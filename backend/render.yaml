services:
  - type: web
    name: slrs-backend
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: CORS_ALLOWED_ORIGINS
        value: https://your-frontend.vercel.app
      - key: WHATSAPP_NUMBER
        value: "919004001598"
    healthCheckPath: /health
